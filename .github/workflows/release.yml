name: Release

# 同一套打包 matrix 服务两种场景(避免两份漂移的副本):
# - push tag v* → 构建三平台安装包并创建 draft GitHub Release
# - workflow_dispatch → 只构建并上传 workflow artifacts(发版前手动验证产物)
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-version:
    if: github.event_name == 'push'
    runs-on: ubuntu-lates
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: 校验 tag 与三处版本号一致
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          TAURI=$(python3 -c "import json;print(json.load(open('app/src-tauri/tauri.conf.json'))['version'])")
          CARGO=$(grep -m1 '^version' app/src-tauri/Cargo.toml | sed 's/.*"\(.*\)"/\1/')
          PKG=$(python3 -c "import json;print(json.load(open('app/package.json'))['version'])")
          echo "tag=$TAG tauri=$TAURI cargo=$CARGO package.json=$PKG"
          [ "$TAG" = "$TAURI" ] && [ "$TAG" = "$CARGO" ] && [ "$TAG" = "$PKG" ] || {
            echo "::error::版本号不一致,发布中止"; exit 1; }

  build:
    needs: [check-version]
    # dispatch 可以在任意 ref(含 tag)上运行,一律按事件类型分流,不看 ref 形状
    if: >-
      always() &&
      (github.event_name == 'workflow_dispatch' || needs.check-version.result == 'success')
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-lates
            target: aarch64-apple-darwin
            bundles: dmg
          - platform: macos-15-intel
            target: x86_64-apple-darwin
            bundles: dmg
          - platform: windows-lates
            target: x86_64-pc-windows-msvc
            bundles: nsis,msi
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: 安装 Rust targe
        run: rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: app/src-tauri

      - name: 前端依赖
        working-directory: app
        run: npm ci

      - name: 构建并发布(tag 触发)
        if: github.event_name == 'push'
        uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # action-v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: app
          tagName: ${{ github.ref_name }}
          releaseName: "Podnote ${{ github.ref_name }}"
          releaseDraft: true
          releaseBody: |
            ## 安装说明

            安装包未做代码签名(个人开源项目):
            - **macOS**:首次打开请在访达中右键 App → 打开;仍被拦时对官方下载的文件执行
              `xattr -dr com.apple.quarantine /Applications/Podnote.app`
            - **Windows(beta)**:SmartScreen 提示时点「更多信息 → 仍要运行」;
              安装过程可能需要联网下载 WebView2 Runtime

            请只从本页下载安装包。详细配置见仓库 README。
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }} -- --locked

      - name: 只构建不发布(手动触发)
        if: github.event_name == 'workflow_dispatch'
        uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # action-v1.0.0
        with:
          projectPath: app
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }} -- --locked

      - name: 上传构建产物(手动触发)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: podnote-${{ matrix.target }}
          path: |
            app/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            app/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            app/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
          if-no-files-found: error
