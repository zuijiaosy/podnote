  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

ont-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"fcd730a5-f7a8-446a-be02-d32c721e0e35\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"db58cc83-e7dd-4ab5-9fc6-e8fcfd94041d\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* Podnote — 色板(锁死,禁止新增颜色)*/\n:root {\n  /* 基础色 */\n  --panel: #ECEAE4;   /* 面板米白 — 全局背景,仪器外壳暖白 */\n  --well: #DCD9D0;    /* 凹槽灰 — 内容区/卡片下沉底色 */\n  --ink: #2C2C2A;     /* 丝印炭 — 主文字 */\n  --scale: #8A897F;   /* 刻度灰 — 次要文字、刻度、非活动波形 */\n  --signal: #D85A30;  /* 信号橙 — 唯一强调色,一屏只允许一处 */\n  --ready: #5DAA6E;   /* 指示绿 — 仅\"就绪/完成\"指示灯,极小面积 */\n\n  /* 线条与状态底：一律为丝印炭透明度衍生，只允许这四档 */\n  --line-hard: var(--ink);                 /* 2px 描边（主圆钮）*/\n  --line-soft: rgba(44, 44, 42, 0.25);     /* 0.25 硬边框 */\n  --line-faint: rgba(44, 44, 42, 0.12);    /* 0.12 分区细线 */\n  --fill-active: rgba(44, 44, 42, 0.10);   /* 0.10 激活底 */\n  --fill-hover: rgba(44, 44, 42, 0.06);    /* 0.06 hover 底 */\n\n  /* 语义别名 */\n  --bg-app: var(--panel);\n  --surface-inset: var(--well);\n  --text-body: var(--ink);\n  --text-dim: var(--scale);\n  --accent: var(--signal);            /* 橙色唯一含义：“你的注意力该在这里”（当前位置系统 / 错误需人介入）*/\n  --status-idle: var(--scale);        /* 灰=待命 */\n  --status-processing: var(--ink);    /* 炭呼吸=运转中（机器自己在干活，不需要人看）*/\n  --status-ready: var(--ready);       /* 绿常亮=完成 */\n  --status-error: var(--signal);      /* 橙常亮（不呼吸）=需要人 */\n}\n\n/* Podnote — 字体(两族,分工严格)\n   等宽 = 机器说的话(时间戳、计数、状态、丝印)\n   无衬线 = 人说的话(笔记内容、标题)*/\n:root {\n  --font-mono: 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, 'SF Mono', Menlo, monospace;\n  --font-sans: -apple-system, 'PingFang SC', 'Source Han Sans SC', 'Noto Sans SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;\n\n  /* 字号 */\n  --text-xs: 10px;   /* 丝印小字、刻度 */\n  --text-sm: 12px;   /* 状态标签、时间戳 */\n  --text-base: 14px; /* 正文 */\n  --text-lg: 16px;   /* 笔记标题 */\n  --text-xl: 20px;   /* 剧集标题 */\n\n  /* 字重:只允许两档 */\n  --weight-regular: 400;\n  --weight-medium: 500;\n\n  /* 机器文字纪律:全大写 + 加宽字距 */\n  --tracking-machine: 0.08em;\n  --tracking-machine-wide: 0.14em;\n\n  /* 行高 */\n  --leading-tight: 1.3;\n  --leading-note: 1.8;  /* 笔记阅读区专用 */\n}\n\n/* Podnote — 8px 网格,所有间距是 8 的倍数 */\n:root {\n  --space-half: 4px; /* 允许的半格 */\n  --space-1: 8px;\n  --space-2: 16px;\n  --space-3: 24px;\n  --space-4: 32px;\n  --space-5: 40px;\n  --space-6: 48px;\n  --space-8: 64px;\n\n  /* 布局 */\n  --sidebar-w: 240px;      /* 左栏磁带架 */\n  --gap-panel: 16px;       /* 分区之间的面板本色缝隙 */\n\n  /* 圆角三档：6px 标准倒角、3px 小机件（拨杆等）、999px 圆钮/指示灯/时间戳胶囊 */\n  --radius: 6px;\n  --radius-sm: 3px;\n  --radius-round: 999px;\n}\n\n/* Podnote — 动效:机械而非弹性。禁止 bounce、禁止弹簧。 */\n:root {\n  --dur: 120ms; /* @kind other */\n  --ease: cubic-bezier(0.2, 0, 0, 1); /* @kind other */ /* 急停缓动 */\n  --ease-linear: linear; /* @kind other */\n}\n\n/* 指示灯呼吸 — 全 App 唯一允许的循环动画 */\n@keyframes pn-breathe {\n  0%, 100% { opacity: 1; }\n  50% { opacity: 0.35; }\n}\n\n/* Podnote — 极简全局基础(仅链接颜色与选区,不做重置)*/\na { color: var(--ink); text-decoration-color: var(--signal); text-underline-offset: 2px; }\na:hover { color: var(--signal); }\n::selection { background: var(--well); color: var(--ink); }\n\n<\u002Fstyle>\n  <script src=\"4dc7bdfe-ee46-4ca0-a1c8-11fcf41df3d9\"><\u002Fscript>\n  <style>\n    html, body { margin: 0; }\n    body { background: #ECEAE4; }\n    a { color: #2C2C2A; }\n    a:hover { color: #D85A30; }\n  <\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"min-height:100vh;background:var(--panel);box-sizing:border-box;padding:24px 16px 48px;display:flex;flex-direction:column;align-items:center;gap:16px;font-family:var(--font-sans)\">\n\n  <!-- ===== 演示条 ===== -->\n  <sc-if value=\"{{ showStrip }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"width:1200px;display:flex;align-items:center;gap:32px;box-sizing:border-box\">\n      <div style=\"display:flex;align-items:center;gap:4px\">\n        <span style=\"font-family:var(--font-mono);font-size:var(--text-xs);letter-spacing:var(--tracking-machine-wide);color:var(--scale);margin-right:8px\">SCREEN<\u002Fspan>\n        <sc-for list=\"{{ sceneBtns }}\" as=\"b\" hint-placeholder-count=\"6\">\n          <button onclick=\"{{ b.pick }}\" style=\"font-family:var(--font-mono);font-size:var(--text-xs);letter-spacing:var(--tracking-machine);text-transform:uppercase;background:{{ b.bg }};color:{{ b.fg }};border:1px solid {{ b.bc }};border-radius:var(--radius-sm);padding:4px 8px;cursor:pointer;transition:background var(--dur) var(--ease),color var(--dur) var(--ease),border-color var(--dur) var(--ease)\">{{ b.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <sc-if value=\"{{ isAdd }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:flex;align-items:center;gap:4px\">\n          <span style=\"font-family:var(--font-mono);font-size:var(--text-xs);letter-spacing:var(--tracking-machine-wide);color:var(--scale);margin-right:8px\">ACT<\u002Fspan>\n          <sc-for list=\"{{ actBtns }}\" as=\"b\" hint-placeholder-count=\"3\">\n            <button onclick=\"{{ b.pick }}\" style=\"font-family:var(--font-mono);font-size:var(--text-xs);letter-spacing:var(--tracking-machine);text-transform:uppercase;background:{{ b.bg }};color:{{ b.fg }};border:1px solid {{ b.bc }};border-radius:var(--radius-sm);padding:4px 8px;cursor:pointer;transition:background var(--dur) var(--ease),color var(--dur) var(--ease),border-color var(--dur) var(--ease)\">{{ b.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <span style=\"flex:1\"><\u002Fspan>\n      <span style=\"font-family:var(--font-mono);font-size:var(--text-xs);letter-spacing:var(--tracking-machine-wide);color:var(--scale)\">PODNOTE · DESIGN V1<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== 窗口 1200 × 800 ===== -->\n  <div style=\"width:1200px;height:800px;flex:none;position:relative;background:var(--panel);border:1px solid var(--line-soft);border-radius:var(--radius);box-sizing:border-box;overflow:hidden\">\n\n    <!-- ============ 主窗口(完成 / 空 / 处理中)============ -->\n    <sc-if value=\"{{ isMain }}\" hint-placeholder-val=\"{{ true }}\">\n      <div data-screen-label=\"主窗口\" style=\"position:absolute;inset:0;display:flex;gap:16px;padding:16px;box-sizing:border-box\">\n\n        <!-- 左:磁带架 -->\n        <div style=\"width:240px;flex:none;background:var(--well);border-radius:var(--radius);display:flex;flex-direction:column;overflow:hidden\">\n          <div style=\"display:flex;align-items:center;gap:8px;padding:16px 16px 8px;box-sizing:border-box\">\n            <x-import component-from-global-scope=\"PodnoteDesignSystem_020823.StatusLabel\" hint-size=\"72px,14px\">PODNOTE<\u002Fx-import>\n            <span style=\"flex:1\"><\u002Fspan>\n            <span style=\"font-family:var(--font-mono);font-size:var(--text-xs);letter-spacing:var(--tracking-machine);color:var(--scale)\">{{ tapeCount }}<\u002Fspan>\n          <\u002Fdiv>\n          <sc-if value=\"{{ hasEpisodes }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"padding:8px 16px;box-sizing:border-box;width:100%\">\n              <x-import component-from-global-scope=\"PodnoteDesignSystem_020823.Button\" variant=\"secondary\" size=\"sm\" on-click=\"{{ openAdd }}\" dc-props=\"{{ fullWidthProps }}\" style=\"width:100%\" hint-size=\"100%,26px\">+ ADD TAPE<\u002Fx-import>\n            <\u002Fdiv>\n            <div style=\"flex:1;min-height:0;overflow:auto;padding:4px 16px 16px;display:flex;flex-direction:column;gap:8px\">\n              <sc-for list=\"{{ episodes }}\" as=\"ep\" hint-placeholder-count=\"5\">\n                <x-import component-from-global-scope=\"EpisodeItem\" date=\"{{ ep.date }}\" show=\"{{ ep.show }}\" title=\"{{ ep.title }}\" duration=\"{{ ep.duration }}\" status=\"{{ ep.status }}\" status-label=\"{{ ep.statusLabel }}\" active=\"{{ ep.active }}\" on-click=\"{{ ep.pick }}\" style=\"width:100%;flex:none\" hint-size=\"100%,88px\"><\u002Fx-import>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ isEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"flex:1;display:flex;align-items:center;justify-content:center\">\n              <span style=\"font-family:var(--font-mono);font-size:var(--text-xs);letter-spacing:var(--tracking-machine-wide);color:var(--scale)\">NO TAPES<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <div style=\"border-top:1px solid var(--line-faint);padding:8px;display:flex;align-items:center\">\n            <x-import component-from-global-scope=\"PodnoteDesignSystem_020823.Button\" variant=\"ghost\" size=\"sm\" on-click=\"{{ toSettings }}\" hint-size=\"80px,26px\">SETTINGS<\u002Fx-import>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- 右:阅读区 / 状态区 -->\n        <div style=\"flex:1;min-width:0;display:flex;flex-direction:column;gap:16px\">\n\n          <!-- 空状态 onboarding -->\n          <sc-if value=\"{{ isEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"flex:1;background:var(--well);border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px\">\n              <x-import component-from-global-scope=\"PodnoteDesignSystem_020823.Button\" variant=\"knob\" size=\"lg\" on-click=\"{{ openAdd }}\" hint-size=\"88px,88px\">GO<\u002Fx-import>\n              <div style=\"display:flex;flex-direction:column;align-items:center;gap:8px\">\n                <span style=\"font r(--ease),border-color var(--dur) var(--ease)\">{{ o.label }}<\u002Fbutton>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"display:flex;align-items:center;gap:24px;padding:16px 0;border-bottom:1px solid var(--line-faint)\">\n              <div style=\"flex:1;display:flex;flex-direction:column;gap:4px\">\n                <span style=\"font-family:var(--font-sans);font-size:var(--text-base);font-weight:var(--weight-medium);color:var(--ink)\">笔记输出目录<\u002Fspan>\n                <span style=\"font-family:var(--font-sans);font-size:var(--text-sm);color:var(--scale)\">每集一个 Markdown 文件<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:8px;flex:none\">\n                <span style=\"font-family:var(--font-mono);font-size:var(--text-sm);letter-spacing:var(--tracking-machine);color:var(--ink)\">{{ outDir }}<\u002Fspan>\n                <x-import component-from-global-scope=\"PodnoteDesignSystem_020823.Button\" variant=\"secondary\" size=\"sm\" hint-size=\"64px,26px\">CHOOSE<\u002Fx-import>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"display:flex;align-items:center;gap:24px;padding:16px 0\">\n              <div style=\"flex:1;display:flex;flex-direction:column;gap:4px\">\n                <div style=\"display:flex;align-items:center;gap:8px\">\n                  <span style=\"font-family:var(--font-sans);font-size:var(--text-base);font-weight:var(--weight-medium);color:var(--ink)\">订阅自动处理<\u002Fspan>\n                  <x-import component-from-global-scope=\"PodnoteDesignSystem_020823.StatusLabel\" tone=\"dim\" hint-size=\"20px,14px\">V2<\u002Fx-import>\n                <\u002Fdiv>\n                <span style=\"font-family:var(--font-sans);font-size:var(--text-sm);color:var(--scale)\">关注的节目更新后自动转写<\u002Fspan>\n              <\u002Fdiv>\n              <x-import component-from-global-scope=\"PodnoteDesignSystem_020823.Lever\" on=\"{{ autoSub }}\" disabled=\"{{ true }}\" style=\"flex:none\" hint-size=\"88px,22px\"><\u002Fx-import>\n            <\u002Fdiv>\n\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ 菜单栏 TRAY ============ -->\n    <sc-if value=\"{{ isTray }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"菜单栏\" style=\"position:absolute;inset:0;display:flex;flex-direction:column\">\n        <div style=\"height:32px;flex:none;display:flex;align-items:center;justify-content:flex-end;gap:24px;padding:0 24px;border-bottom:1px solid var(--line-faint)\">\n          <span style=\"display:inline-flex;align-items:center;gap:4px;border:1px solid var(--line-soft);border-radius:var(--radius-sm);padding:2px 8px;background:var(--fill-active)\">\n            <span style=\"font-family:var(--font-mono);font-size:var(--text-xs);font-weight:var(--weight-medium);letter-spacing:var(--tracking-machine);color:var(--ink)\">PN<\u002Fspan>\n            <span style=\"width:4px;height:4px;border-radius:var(--radius-round);background:var(--signal)\"><\u002Fspan>\n          <\u002Fspan>\n          <span style=\"font-family:var(--font-mono);font-size:var(--text-xs);letter-spacing:var(--tracking-machine);color:var(--scale)\">07-10 FRI 09:41<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"flex:1;position:relative\">\n          <div style=\"position:absolute;top:8px;right:88px;width:300px;background:var(--panel);border:1px solid var(--line-soft);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column\">\n            <div style=\"display:flex;align-items:center;gap:8px;padding:12px 16px;border-bottom:1px solid var(--line-faint)\">\n              <x-import component-from-global-scope=\"PodnoteDesignSystem_020823.StatusLabel\" hint-size=\"72px,14px\">PODNOTE<\u002Fx-import>\n              <span style=\"flex:1\"><\u002Fspan>\n              <x-import component-from-global-scope=\"PodnoteDesignSystem_020823.StatusLabel\" tone=\"signal\" hint-size=\"40px,14px\">2 NEW<\u002Fx-import>\n            <\u002Fdiv>\n            <sc-for list=\"{{ trayItems }}\" as=\"it\" hint-placeholder-count=\"3\">\n              <div onclick=\"{{ it.open }}\" style=\"display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;border-bottom:1px solid var(--line-faint)\" style-hover=\"background:var(--fill-hover)\">\n                <div style=\"flex:1;min-width:0;display:flex;flex-direction:column;gap:4px\">\n                  <span style=\"font-family:var(--font-sans);font-size:var(--text-sm);font-weight:var(--weight-medium);color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">{{ it.title }}<\u002Fspan>\n                  <div style=\"display:flex;align-items:center;gap:8px\">\n                    <span style=\"font-family:var(--font-sans);font-size:var(--text-sm);color:var(--scale);overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">{{ it.show }}<\u002Fspan>\n                    <span style=\"flex:1\"><\u002Fspan>\n                    <span style=\"font-family:var(--font-mono);font-size:var(--text-xs);letter-spacing:var(--tracking-machine);color:var(--scale)\">{{ it.date }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <sc-if value=\"{{ it.isNew }}\" hint-placeholder-val=\"{{ false }}\">\n                  <span style=\"width:6px;height:6px;flex:none;border-radius:var(--radius-round);background:var(--signal)\"><\u002Fspan>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n            <div style=\"display:flex;align-items:center;padding:8px;box-sizing:border-box\">\n              <x-import component-from-global-scope=\"PodnoteDesignSystem_020823.Button\" variant=\"ghost\" size=\"sm\" on-click=\"{{ backMain }}\" hint-size=\"112px,26px\">OPEN PODNOTE<\u002Fx-import>\n              <span style=\"flex:1\"><\u002Fspan>\n              <span style=\"font-family:var(--font-mono);font-size:var(--text-xs);letter-spacing:var(--tracking-machine);color:var(--scale);padding-right:8px\">{{ tapeCount }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1240,&quot;height&quot;:920},&quot;showDemoStrip&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Demo&quot;},&quot;startScreen&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;FULL&quot;,&quot;EMPTY&quot;,&quot;WORKING&quot;,&quot;ADD&quot;,&quot;SETTINGS&quot;,&quot;TRAY&quot;],&quot;default&quot;:&quot;FULL&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Demo&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    scene: 'main', dataMode: 'full', selectedId: 'e1',\n    playing: false, speed: 1, progressMap: { e1: 0.32 }, activeT: null,\n    addAct: 'input',\n    addUrl: 'https://www.xiaoyuzhoufm.com/episode/6842f10a9a3b4e7c1d2e88a1',\n    simT0: 0, added: false, e3RetryAt: 0, workStart: 0,\n    llm: 'CLAUDE-SONNET-4-5', whisper: 'LARGE-V3',\n    apiKey: '••••••••••••',\n    outDir: '~/Documents/Podnote', autoSub: false,\n    now: Date.now(),\n  };\n\n  componentDidMount() {\n    const sc = this.props.startScreen;\n    if (sc && sc !== 'FULL') this.pickScreen(sc);\n    this._iv = setInterval(() => this.tick(), 250);\n  }\n  componentWillUnmount() { clearInterval(this._iv); }\n\n  pickScreen(label) {\n    const map = {\n      FULL: { scene: 'main', dataMode: 'full', selectedId: 'e1' },\n      EMPTY: { scene: 'main', dataMode: 'empty' },\n      WORKING: { scene: 'main', dataMode: 'working', selectedId: 'e2', workStart: Date.now() },\n      ADD: { scene: 'add', dataMode: 'full', addAct: 'input' },\n      SETTINGS: { scene: 'settings' },\n      TRAY: { scene: 'tray' },\n    };\n    if (map[label]) this.setState(Object.assign({ playing: false, activeT: null }, map[label]));\n  }\n\n  tick() {\n    const st = this.state;\n    const now = Date.now();\n    const upd = { now };\n    if (st.playing) {\n      const ep = this.allEps().find((e) => e.id === st.selectedId);\n      if (ep) {\n        let p = (st.progressMap[ep.id] || 0) + (0.25 * st.speed) / ep.durS;\n        if (p >= 1) { p = 1; upd.playing = false; }\n        upd.progressMap = Object.assign({}, st.progressMap, { [ep.id]: p });\n      }\n    }\n    if (st.scene === 'add' && st.addAct === 'run' && st.simT0) {\n      const t = (now - st.simT0) / 1000;\n      if (t >= 13) {\n        Object.assign(upd, { added: true, scene: 'main', dataMode: 'full', selectedId: 'e0', addAct: 'input', simT0: 0, playing: false, activeT: null });\n      }\n    }\n    this.setState(upd);\n  }\n\n  eps() {\n    if (!this._eps) this._eps = [\n      { id: 'e1', show: '商业就是这样', title: '便利店为什么越来越像餐厅', date: '07-08', duration: '42:17', durS: 2537 },\n      { id: 'e2', show: '声东击西', title: '和 AI 共处的一年:记忆、外包与新的懒惰', date: '07-05', duration: '58:43', durS: 3523 },\n      { id: 'e3', show: '疯投圈', title: '咖啡的尽头是供应链', date: '06-28', duration: '1:12:06', durS: 4326 },\n      { id: 'e4', show: '不合时宜', title: '重新学会无聊', date: '06-21', duration: '49:30', durS: 2970 },\n      { id: 'e5', show: '得意忘形', title: '注意力是唯一的货币', date: '06-14', duration: '1:03:52', durS: 3832 },\n    ];\n    return this._eps;\n  }\n  addedEp() {\n    return { id: 'e0', show: '晚点聊 LateTalk', title: '大模型这半年:热钱、落地与幻觉', date: '07-10', duration: '56:08', durS: 3368 };\n  }\n  allEps() { return [this.addedEp()].concat(this.eps()); }\n\n  notes() {\n    if (!this._notes) this._notes = {\n      e1: {\n        tldr: '便利店的下一场战争不在门店数量,而在鲜食供应链:谁能把\"顺路买\"变成\"专程来\",谁就赢。',\n        points: [\n          { t: 252, ts: '04:12', h: '香烟流量正在失效', body: '传统便利店靠香烟、饮料这类高频低毛利品带来人流,但它们本身不赚钱。随着这部分需求被外卖和自动售货分流,便利店必须找到新的进店理由,否则位置优势会迅速贬值。' },\n          { t: 698, ts: '11:38', h: '鲜食是毛利,更是壁垒', body: '一个饭团的毛利率可以做到 45%,是香烟的十倍。但鲜食考验冷链、日配和报废率管理——这套供应链能力需要门店密度支撑,单店学不会,这正是全家和 7-Eleven 的护城河。' },\n          { t: 1145, ts: '19:05', h: '中国市场的特殊解法', body: '日系便利店的冷鲜食模型搬到中国水土不服:中国消费者要热食。于是关东煮、蒸包、现磨咖啡成了本土化答案,便利店越来越像一个 24 小时营业的小餐馆。' },\n          { t: 1664, ts: '27:44', h: '终局是即时零售节点', body: '当外卖平台把 30 分钟送达变成默认预期,便利店门店本身就成了前置仓。线下卖鲜食、线上做履约,一张门店网络同时跑两种生意。' },\n        ],\n        quotes: [\n          { t: 423, ts: '07:03', text: '香烟是便利店的流量,但流量从来不是生意本身。' },\n          { t: 927, ts: '15:27', text: '鲜食的本质是制造业,不是零售业——你得像管工厂一样管一个饭团。' },\n          { t: 1430, ts: '23:50', text: '中国便利店的答案不在东京,在你家楼下的早餐摊。' },\n          { t: 1999, ts: '33:19', text: '未来你可能分不清一家店是便利店、餐馆还是仓库,它三者都是。' },\n        ],\n        resources: [\n          { name: '《零售的哲学》', note: '铃木敏文回顾 7-Eleven 方法论,节目多次引用其\"假设—验证\"框架' },\n          { name: '罗森中国', note: '讨论其在下沉市场的区域加盟模型' },\n          { name: '便利蜂', note: '作为算法驱动门店的反例被提及' },\n          { name: '美宜佳', note: '三万家门店的\"夫妻店升级\"路径' },\n        ],\n        questions: [\n          '鲜食供应链的密度门槛在哪个数量级?一个城市要多少家店才能摊平日配成本?',\n          '即时零售把便利店变成前置仓之后,用户到底属于平台还是门店?',\n          '日本便利店的\"银发餐桌\"生意,在中国的老龄化背景下是否成立?',\n        ],\n      },\n      e2: {\n        tldr: '把记忆外包给 AI 之后,重要的不是记住什么,而是知道去哪里找回、以及哪些事必须亲自想。',\n        points: [\n          { t: 340, ts: '05:40', h: '外包记忆不是新鲜事', body: '从文字、印刷到搜索引擎,人类一直在外包记忆。AI 的不同在于它外包的是\"组织记忆的方式\"——连问题该怎么问,都替你想好了。' },\n          { t: 1102, ts: '18:22', h: '新的懒惰是不再复述', body: '过去读完一本书,要复述给别人才算真的懂。现在让 AI 总结,省掉的恰恰是\"复述\"这个让知识长在身上的过程。' },\n          { t: 1867, ts: '31:07', h: '检索能力取代存储能力', body: '与其焦虑记不住,不如把精力花在建立个人索引:知道自己在哪里存过什么,比存了什么更重要。' },\n          { t: 2775, ts: '46:15', h: '哪些事必须亲自想', body: '判断、品味、责任——这三样外包出去就等于让渡自我。两位主播对\"品味能否外包\"产生了少见的分歧。' },\n        ],\n        quotes: [\n          { t: 571, ts: '09:31', text: '我们不是记性变差了,是从来没打算记住。' },\n          { t: 1488, ts: '24:48', text: 'AI 总结的书,你只是知道了,没有懂。' },\n          { t: 2342, ts: '39:02', text: '索引即记忆:知道去哪找,就是新时代的博闻强识。' },\n          { t: 3150, ts: '52:3 ext: '灵感不来自专注,来自专注之间的缝隙。' },\n          { t: 2657, ts: '44:17', text: '日程表上没有空白的人,生活里也不会有意外。' },\n        ],\n        resources: [\n          { name: '《无聊的哲学》', note: '拉斯·史文德森,节目上半场的讨论框架来源' },\n          { name: '默认模式网络', note: '走神与创造力关系的神经科学依据' },\n        ],\n        questions: [\n          '数字戒断的可持续版本长什么样?完全离线是不是一种表演?',\n          '存在性无聊是否是中年危机的早期信号?',\n        ],\n      },\n      e5: {\n        tldr: '注意力是你唯一真正拥有的资源:花在哪里,你就成为什么样的人。',\n        points: [\n          { t: 543, ts: '09:03', h: '注意力经济的会计学', body: '免费产品的商业模式是把你的注意力打包卖给广告主。看清这笔账之后,\"刷十分钟\"的真实成本就变得可以计算了。' },\n          { t: 1651, ts: '27:31', h: '冥想是注意力的力量训练', body: '冥想不是放空,而是反复练习\"发现走神—拉回来\"这个动作。就像举铁练的不是某次动作,而是肌肉本身。' },\n          { t: 2998, ts: '49:58', h: '把注意力当预算来编制', body: '与其列待办清单,不如做注意力预算:先划定每天最好的两小时给谁,剩下的时间才轮到别人来分。' },\n        ],\n        quotes: [\n          { t: 926, ts: '15:26', text: '你的人生,就是你注意过的所有东西的总和。' },\n          { t: 2112, ts: '35:12', text: '算法不偷你的时间,它偷的是你分配时间的能力。' },\n          { t: 3460, ts: '57:40', text: '先决定不看什么,剩下的才叫选择。' },\n        ],\n        resources: [\n          { name: '《深度工作》', note: '卡尔·纽波特,\"注意力预算\"说法的出处' },\n          { name: '威廉·詹姆斯', note: '《心理学原理》注意力章节,开场引用' },\n        ],\n        questions: [\n          '注意力预算如何对抗\"临时但紧急\"的侵占?',\n          '把注意力量化本身,会不会又变成一种消耗注意力的仪表盘?',\n        ],\n      },\n      e0: {\n        tldr: '热钱还在,但叙事变了:从\"模型能做什么\"到\"谁真的付钱\",落地最快的都是原本就有预算的场景。',\n        points: [\n          { t: 422, ts: '07:02', h: '融资集中度越来越高', body: '头部几家拿走了绝大多数融资,中腰部模型公司开始转向行业模型或被并购。\"百模大战\"实际上已经结束了。' },\n          { t: 1470, ts: '24:30', h: '付费场景的三个共性', body: '客服、编程、营销素材——共性是原本就有明确预算线、效果可量化、错了能兜底。新预算很难开,老预算的搬家最快。' },\n          { t: 2478, ts: '41:18', h: '幻觉不是 bug,是定价问题', body: '幻觉率降不到零,真正的问题是错误的成本由谁承担。按这个框架看,医疗和法律的落地路径注定和客服完全不同。' },\n        ],\n        quotes: [\n          { t: 765, ts: '12:45', text: '落地最快的场景,都是原来就有预算的场景。' },\n          { t: 2000, ts: '33:20', text: '企业买的不是模型,是责任的转移。' },\n          { t: 3006, ts: '50:06', text: '幻觉的成本谁承担,决定了它在哪些行业是致命的。' },\n        ],\n        resources: [\n          { name: '行业模型', note: '中腰部公司的转型方向,金融与医疗被点名' },\n        ],\n        questions: [\n          '\"责任转移\"作为采购动机,会把行业推向少数大供应商吗?',\n          '按错误成本给幻觉定价,有没有可操作的框架?',\n        ],\n      },\n    };\n    return this._notes;\n  }\n\n  fmt(sec) {\n    sec = Math.max(0, Math.floor(sec));\n    const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60;\n    const p = (n) => String(n).padStart(2, '0');\n    return h ? h + ':' + p(m) + ':' + p(s) : p(m) + ':' + p(s);\n  }\n\n  bars(id) {\n    this._bars = this._bars || {};\n    if (!this._bars[id]) {\n      let s = id.split('').reduce((a, c) => a + c.charCodeAt(0) * 37, 7);\n      const out = [];\n      for (let i = 0; i < 110; i++) { s = (s * 16807) % 2147483647; out.push(0.2 + (s % 1000) / 1000 * 0.8); }\n      this._bars[id] = out;\n    }\n    return this._bars[id];\n  }\n\n  buildStages(t) {\n    const pct = Math.min(100, Math.round(((t - 1.2) / 2.5) * 100));\n    const chars = Math.round(Math.min(3, Math.max(0, t - 8.7)) / 3 * 1982);\n    const st = [];\n    st.push(t < 1.2 ? { status: 'processing', label: 'RESOLVE', meta: '' } : { status: 'ready', label: 'RESOLVE', meta: '56:08 · 38.2 MB' });\n    st.push(t < 1.2 ? { status: 'off', label: 'DOWNLOAD', meta: '' } : t < 3.7 ? { status: 'processing', label: 'DOWNLOAD', meta: pct + '%' } : { status: 'ready', label: 'DOWNLOAD', meta: '38.2 MB' });\n    st.push(t < 3.7 ? { status: 'off', label: 'TRANSCRIBE', meta: '' } : t < 8.7 ? { status: 'processing', label: 'TRANSCRIBE', meta: this.fmt((t - 3.7) * 60) + ' · ~' + Math.min(96, Math.round(((t - 3.7) / 5) * 100)) + '%' } : { status: 'ready', label: 'TRANSCRIBE', meta: '04:55' });\n    st.push(t < 8.7 ? { status: 'off', label: 'SUMMARIZE', meta: '' } : t < 11.7 ? { status: 'processing', label: 'SUMMARIZE', meta: chars.toLocaleString() + ' CHARS' } : { status: 'ready', label: 'SUMMARIZE', meta: '1,982 CHARS' });\n    st.push(t < 11.7 ? { status: 'off', label: 'READY', meta: '' } : { status: 'ready', label: 'READY', meta: '07-10' });\n    return st;\n  }\n\n  renderVals() {\n    const st = this.state, now = st.now;\n    const scene = st.scene, dataMode = st.dataMode;\n    const isMain = scene === 'main' || scene === 'add';\n    const isAdd = scene === 'add';\n    const isSettings = scene === 'settings';\n    const isTray = scene === 'tray';\n    const isEmpty = isMain && dataMode === 'empty';\n\n    const base = this.eps();\n    let list = [];\n    if (dataMode === 'full') {\n      list = (st.added ? [this.addedEp()] : []).concat(base).map((e) => Object.assign({}, e, { status: 'ready', statusLabel: 'READY' }));\n    } else if (dataMode === 'working') {\n      const e3Resolving = st.e3RetryAt > 0 && now - st.e3RetryAt < 2500;\n      const m = {\n        e2: { status: 'processing', statusLabel: 'TRANSCRIBING' },\n        e3: e3Resolving ? { status: 'processing', statusLabel: 'RESOLVING' } : { status: 'error', statusLabel: 'ERROR' },\n        e4: { status: 'off', statusLabel: 'QUEUED' },\n        e5: { status: 'off', statusLabel: 'QUEUED' },\n        e1: { status: 'ready', statusLabel: 'READY' },\n      };\n      list = ['e2', 'e3', 'e4', 'e5', 'e1'].map((id) => Object.assign({}, base.find((e) => e.id === id), m[id]));\n    }\n    const episodes = list.map((e) => Object.assign({}, e, {\n      active: e.id === st.selectedId,\n      pick: () => this.setState({ selectedId: e.id, playing: false, activeT: null }),\n    }));\n    const sel = episodes.find((e) => e.id === st.selectedId) || null;\n    const hasEpisodes = episodes.length > 0;\n    const tapeCount = episodes.length + (episodes.length === 1 ? ' TAPE' : ' TAPES');\n\n    const hasSel = !!sel && !isEmpty;\n    const selReady = !!(sel && sel.status === 'ready');\n    const selError = !!(sel && sel.status === 'error');\n    const selQueued = !!(sel && sel.status === 'off');\n    const selWorking = !!(sel && sel.status === 'processing');\n\n    let note = null, points = [], quotes = [], resources = [], questions = [], anchors = [];\n    let curTime = '00:00', prog = 0, waveBars = [];\n    if (selReady) {\n      note = this.notes()[sel.id];\n      prog = st.progressMap[sel.id] || 0;\n      const mk = (t) => ({\n        active: st.activeT === t,\n        seek: () => this.setState({\n          progressMap: Object.assign({}, this.state.progressMap, { [sel.id]: t / sel.durS }),\n          activeT: t, playing: true,\n        }),\n      });\n      points = note.points.map((p) => Object.assign({}, p, mk(p.t)));\n      quotes = note.quotes.map((q) => Object.assign({}, q, mk(q.t)));\n      resources = note.resources;\n      questions = note.questions.map((q, i) => ({ idx: 'Q' + (i + 1), text: q }));\n      anchors = note.points.concat(note.quotes).map((x) => x.t / sel.durS);\n      curTime = this.fmt(prog * sel.durS);\n      waveBars = this.bars(sel.id);\n    }\n    const playLabel = st.playing ? 'PAUSE' : 'PLAY';\n    const speedLabel = { 1: '1.0X', 1.5: '1.5X', 2: '2.0X' }[st.speed];\n    const togglePlay = () => this.setState({ playing: !this.state.playing });\n    const cycleSpeed = () => this.setState({ speed: { 1: 1.5, 1.5: 2, 2: 1 }[this.state.speed] });\n    const seekFrac = (f) => {\n      if (!sel) return;\n      this.setState({ progressMap: Object.assign({}, this.state.progressMap, { [sel.id]: f }) });\n    };\n\n    let machLabel = '', machStages = [], machNote = '', machHasMeter = false, machElapsed = '', machPct = 0, machMeta = '';\n    if (selWorking && sel.id === 'e2') {\n      const el = 754 + Math.max(0, (now - (st.workStart || now)) / 1000);\n      machLabel = 'TRANSCRIBING';\n      machHasMeter = true;\n      machElapsed = this.fmt(el);\n      machPct = Math.min(92, Math.round((el / 2110) * 100));\n      machMeta = 'WHISPER LARGE-V3 · ~' + machPct + '%';\n      machStages = [\n        { status: 'ready', label: 'RESOLVE' }, { status: 'ready', label: 'DOWNLOAD' },\n        { status: 'processing', label: 'TRANSCRIBE' }, { status: 'off', label: 'SUMMARIZE' }, { status: 'off', label: 'READY' },\n      ];\n      machNote = '本地转写中,通常需要几分钟。完成后菜单栏会亮起提示。';\n    } else if (selWorking) {\n      machLabel = 'RESOLVING';\n      machStages = [\n        { status: 'processing', label: 'RESOLVE' }, { status: 'off', label: 'DOWNLOAD' },\n        { status: 'off', label: 'TRANSCRIBE' }, { status: 'off', label: 'SUMMARIZE' }, { status: 'off', label: 'READY' },\n      ];\n      machNote = '正在重新解析这个链接。';\n    }\n\n    const queuedText = sel && selQueued\n      ? '排在第 ' + (sel.id === 'e4' ? 1 : 2) + ' 位。前面的磁带转写完成后自动开始。'\n      : '';\n\n    const errUrl = 'https://www.xiaoyuzhoufm.com/episode/64f3a2b18c0a4d9e5f7b21c8';\n    const retryE3 = () => this.setState({ e3RetryAt: Date.now() });\n    const editErrUrl = () => this.setState({ scene: 'add', addAct: 'input', addUrl: errUrl });\n\n    const t = st.addAct === 'run' && st.simT0 ? (now - st.simT0) / 1000 : 0;\n    const stages = this.buildStages(t);\n    const addActInput = isAdd && st.addAct === 'input';\n    const addActRun = isAdd && st.addAct === 'run';\n    const addActError = isAdd && st.addAct === 'error';\n    const startRun = () => this.setState({ addAct: 'run', simT0: Date.now(), added: false, scene: 'add' });\n    const toInput = () => this.setState({ addAct: 'input' });\n    const closeAdd = () => this.setState({ scene: 'main' });\n    const openAdd = () => this.setState({ scene: 'add', addAct: 'input' });\n    const setUrl = (e) => this.setState({ addUrl: e.target.value });\n\n    const cur = isSettings ? 'SETTINGS' : isTray ? 'TRAY' : isAdd ? 'ADD' : { full: 'FULL', empty: 'EMPTY', working: 'WORKING' }[dataMode];\n    const mkBtn = (label, active, pick) => ({\n      label, pick,\n      bg: active ? 'var(--ink)' : 'transparent',\n      fg: active ? 'var(--panel)' : 'var(--scale)',\n      bc: active ? 'var(--ink)' : 'var(--line-soft)',\n    });\n    const sceneBtns = ['FULL', 'EMPTY', 'WORKING', 'ADD', 'SETTINGS', 'TRAY'].map((l) => mkBtn(l, cur === l, () => this.pickScreen(l)));\n    const actBtns = [['INPUT', 'input'], ['RUN', 'run'], ['ERROR', 'error']].map((pair) =>\n      mkBtn(pair[0], st.addAct === pair[1], () => (pair[1] === 'run' ? startRun() : this.setState({ addAct: pair[1] }))));\n\n    const llmOpts = ['CLAUDE-SONNET-4-5', 'DEEPSEEK-V3'].map((l) => mkBtn(l, st.llm === l, () => this.setState({ llm: l })));\n    const whisperOpts = ['MEDIUM', 'LARGE-V3'].map((l) => mkBtn(l, st.whisper === l, () => this.setState({ whisper: l })));\n    const setKey = (e) => this.setState({ apiKey: e.target.value });\n    const toSettings = () => this.setState({ scene: 'settings' });\n    const backMain = () => this.setState({ scene: 'main', dataMode: 'full', selectedId: this.state.added ? 'e0' : 'e1' });\n\n    const fullList = (st.added ? [this.addedEp()] : []).concat(base);\n    const trayItems = fullList.slice(0, 3).map((e, i) => Object.assign({}, e, {\n      isNew: i < 2,\n      open: () => this.setState({ scene: 'main', dataMode: 'full', selectedId: e.id }),\n    }));\n\n    return {\n      showStrip: this.props.showDemoStrip !== false,\n      isMain, isAdd, isSettings, isTray, isEmpty,\n      episodes, sel, hasSel, hasEpisodes, tapeCount,\n      selReady, selError, selQueued, selWorking,\n      note, points, quotes, resources, questions, anchors,\n      curTime, prog, waveBars, waveH: 40,\n      playLabel, speedLabel, togglePlay, cycleSpeed, seekFrac,\n      machLabel, machStages, machNote, machHasMeter, machElapsed, machPct, machMeta,\n      queuedText, errUrl, retryE3, editErrUrl,\n      stages, addActInput, addActRun, addActError,\n      startRun, toInput, closeAdd, openAdd, setUrl, addUrl: st.addUrl,\n      sceneBtns, actBtns,\n      llmOpts, whisperOpts, apiKey: st.apiKey, setKey, outDir: st.outDir, autoSub: st.autoSub,\n      toSettings, backMain, trayItems,\n      fullWidthProps: { style: { width: '100%' } },\n      keyProps: { style: { width: '264px' } },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fh
