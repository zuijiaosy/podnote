<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Podnote — 正式设计稿 v2</title>
<style>
/* ============================================================
   Podnote 设计宪法 v2 — TOKENS（锁死，工程侧原样拷走）
   ============================================================ */
:root {
  /* 色板：六色 + ink 透明度衍生，禁止新增 */
  --panel:  #ECEAE4;  /* 面板米白 — 仪器外壳 */
  --well:   #DCD9D0;  /* 凹槽灰 — 内容下沉井 */
  --ink:    #2C2C2A;  /* 丝印炭 — 主文字 */
  --scale:  #8A897F;  /* 刻度灰 — 次要文字/非活动 */
  --signal: #D85A30;  /* 信号橙 — 唯一语义：注意力该在这里 */
  --ready:  #5DAA6E;  /* 指示绿 — 仅就绪/完成，极小面积 */

  /* 线条与状态底（ink 衍生，仅四档） */
  --line-soft:  rgba(44,44,42,0.25);
  --line-faint: rgba(44,44,42,0.12);
  --fill-active: rgba(44,44,42,0.10);
  --fill-hover:  rgba(44,44,42,0.06);

  /* 字体：等宽只装 ASCII 机器文本；中文一律无衬线 */
  --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
  --font-sans: -apple-system, 'PingFang SC', 'Source Han Sans SC', 'Noto Sans SC', sans-serif;

  /* 字号五档，刻度外禁用 */
  --text-xs: 10px; --text-sm: 12px; --text-base: 14px; --text-lg: 16px; --text-xl: 20px;

  /* 字重两档 */
  --w-regular: 400; --w-medium: 500;

  /* 机器文字纪律 */
  --track-machine: 0.08em; --track-wide: 0.14em;

  /* 行高 */
  --leading-tight: 1.3; --leading-note: 1.8;

  /* 8px 网格（允许 4px 半格） */
  --s1: 8px; --s2: 16px; --s3: 24px; --s4: 32px; --s5: 40px; --s6: 48px; --half: 4px;

  /* 圆角三档 */
  --radius: 6px; --radius-sm: 3px; --radius-round: 999px;

  /* 动效：机械急停，禁止弹簧 */
  --dur: 120ms;
  --ease: cubic-bezier(0.2, 0, 0, 1);

  --sidebar-w: 248px;
}

/* ============================================================
   基础
   ============================================================ */
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  background: #C9C7BF; /* 展示桌面 = panel 压暗，仅设计稿舞台使用，非 App 色 */
  font-family: var(--font-sans);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  display: flex; flex-direction: column; align-items: center;
  min-height: 100vh; padding: 32px 32px 96px;
}
::selection { background: var(--well); color: var(--ink); }
a { color: var(--ink); text-decoration-color: var(--signal); text-underline-offset: 2px; }
button { font: inherit; color: inherit; }
button:focus-visible, input:focus-visible, [tabindex]:focus-visible {
  outline: 2px solid var(--ink); outline-offset: 2px;
}
@media (prefers-reduced-motion: reduce) {
  * { animation: none !important; transition: none !important; }
}

/* 机器文本工具类 */
.m   { font-family: var(--font-mono); letter-spacing: var(--track-machine); font-variant-numeric: tabular-nums; }
.m-w { font-family: var(--font-mono); letter-spacing: var(--track-wide); text-transform: uppercase; font-variant-numeric: tabular-nums; }

/* ============================================================
   组件：StatusLabel 丝印状态词
   ============================================================ */
.slabel {
  font-family: var(--font-mono); font-size: var(--text-xs); font-weight: var(--w-medium);
  letter-spacing: var(--track-wide); text-transform: uppercase; color: var(--ink);
  font-variant-numeric: tabular-nums;
}
.slabel.dim { color: var(--scale); }
.slabel.signal { color: var(--signal); }

/* ============================================================
   组件：IndicatorLight 指示灯
   灰=待命 · 炭呼吸=运转中 · 绿常亮=完成 · 橙常亮=需要人
   ============================================================ */
.light { display: inline-flex; align-items: center; gap: var(--s1); }
.light .dot {
  width: 8px; height: 8px; flex: none; border-radius: var(--radius-round);
  background: var(--scale); opacity: 0.5;
}
.light.working .dot { background: var(--ink); opacity: 1; animation: pn-breathe 2s linear infinite; }
.light.done    .dot { background: var(--ready); opacity: 1; }
.light.error   .dot { background: var(--signal); opacity: 1; }
.light .lab { font-family: var(--font-mono); font-size: var(--text-xs); font-weight: var(--w-medium);
  letter-spacing: var(--track-machine); text-transform: uppercase; color: var(--scale); }
.light.working .lab, .light.done .lab { color: var(--ink); }
.light.error .lab { color: var(--signal); }
@keyframes pn-breathe { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }

/* ============================================================
   组件：Button（knob / secondary / ghost）+ 机械按压
   ============================================================ */
.btn {
  font-family: var(--font-mono); font-size: var(--text-sm); font-weight: var(--w-medium);
  letter-spacing: var(--track-machine); text-transform: uppercase;
  cursor: pointer; user-select: none; border-radius: var(--radius);
  transition: background var(--dur) var(--ease), border-color var(--dur) var(--ease),
              transform var(--dur) var(--ease), color var(--dur) var(--ease);
}
.btn:active { transform: translateY(1px); }
.btn.secondary { background: var(--well); border: 1px solid var(--line-soft); padding: var(--s1) var(--s2); }
.btn.secondary:hover { background: var(--fill-hover); }
.btn.ghost { background: transparent; border: 1px solid transparent; color: var(--scale); padding: var(--s1) var(--s2); }
.btn.ghost:hover { background: var(--fill-hover); color: var(--ink); }
.btn.knob {
  width: 88px; height: 88px; border-radius: var(--radius-round);
  background: var(--signal); color: var(--panel); border: 2px solid var(--ink);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: var(--text-sm);
}
.btn.knob:hover { filter: brightness(0.94); }
.btn.sm { font-size: var(--text-xs); padding: var(--half) var(--s1); }

/* ============================================================
   组件：Input 凹槽输入
   ============================================================ */
.input {
  font-family: var(--font-mono); font-size: var(--text-sm); letter-spacing: var(--track-machine);
  color: var(--ink); background: var(--well);
  border: 1px solid var(--line-soft); border-radius: var(--radius);
  padding: var(--s1) 12px; outline: none;
  transition: border-color var(--dur) var(--ease);
}
.input:focus { border-color: var(--ink); }
.input::placeholder { color: var(--scale); }

/* ============================================================
   组件：Lever 拨杆（方形轨道，禁止 iOS 圆角）
   ============================================================ */
.lever { display: inline-flex; align-items: center; gap: 12px; cursor: pointer; user-select: none; background: none; border: none; padding: 0; }
.lever .track {
  width: 44px; height: 22px; position: relative; flex: none;
  background: var(--well); border: 1px solid var(--line-soft); border-radius: var(--radius-sm);
  transition: border-color var(--dur) var(--ease), background var(--dur) var(--ease);
}
.lever[aria-checked="true"] .track { background: var(--fill-active); border-color: var(--ink); }
.lever .thumb {
  position: absolute; top: 2px; left: 2px; width: 16px; height: 16px;
  background: var(--ink); border-radius: 2px;
  transition: transform var(--dur) var(--ease);
}
.lever[aria-checked="true"] .thumb { transform: translateX(22px); }
.lever .state { font-family: var(--font-mono); font-size: var(--text-xs);
  letter-spacing: var(--track-machine); color: var(--scale); width: 28px; text-align: left; }
.lever[disabled] { opacity: 0.4; cursor: default; }

/* ============================================================
   组件：Timestamp 磁带计数器（可点击回跳）
   ============================================================ */
.tstamp {
  font-family: var(--font-mono); font-size: var(--text-sm); font-weight: var(--w-regular);
  letter-spacing: var(--track-machine); font-variant-numeric: tabular-nums;
  color: var(--scale); background: transparent;
  border: 1px solid var(--line-soft); border-radius: var(--radius-round);
  padding: 1px 10px 2px; cursor: pointer;
  transition: color var(--dur) var(--ease), border-color var(--dur) var(--ease);
}
.tstamp:hover { color: var(--ink); border-color: var(--ink); }
.tstamp.active { color: var(--signal); border-color: var(--signal); }

/* ============================================================
   组件：EpisodeItem 磁带盒
   ============================================================ */
.tape {
  display: block;
  background: var(--well); border: 1px solid var(--line-soft); border-radius: var(--radius);
  padding: var(--s1) 12px; cursor: pointer; width: 100%; text-align: left;
  transition: border-color var(--dur) var(--ease), background var(--dur) var(--ease);
}
.tape .row { width: 100%; }
.tape .title, .tape .err-reason { display: block; }
.tape:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }
.tape:hover { background: var(--fill-hover); }
.tape.active { border-color: var(--ink); }
.tape .row { display: flex; align-items: center; justify-content: space-between; gap: var(--s1); }
.tape .show { font-family: var(--font-sans); font-size: var(--text-sm); color: var(--scale);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
.tape .date { font-family: var(--font-mono); font-size: var(--text-xs);
  letter-spacing: var(--track-machine); color: var(--scale); flex: none; font-variant-numeric: tabular-nums; }
.tape .title {
  font-family: var(--font-sans); font-size: var(--text-base); font-weight: var(--w-medium);
  color: var(--ink); line-height: var(--leading-tight); margin: var(--half) 0;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.tape .err-reason { font-family: var(--font-sans); font-size: var(--text-sm); color: var(--scale);
  line-height: var(--leading-tight); margin-bottom: var(--half); }
.tape .dur { font-family: var(--font-mono); font-size: var(--text-xs);
  letter-spacing: var(--track-machine); color: var(--scale); font-variant-numeric: tabular-nums; }

/* ============================================================
   组件：Waveform 波形刻度（真进度条）
   ============================================================ */
.wave { display: flex; align-items: center; gap: 2px; height: 40px; cursor: pointer; position: relative; }
.wave .bar { flex: 1; min-width: 1px; max-width: 3px; border-radius: 1px; background: var(--scale); opacity: 0.5; }
.wave .bar.played { background: var(--ink); opacity: 1; }
.wave .bar.anchor { background: var(--signal); opacity: 1; height: 100% !important; }
.wave .head {
  position: absolute; top: -4px; bottom: -4px; width: 2px; background: var(--signal);
  border-radius: 1px; pointer-events: none;
}

/* ============================================================
   组件：Transport 走带控制
   ============================================================ */
.transport { display: flex; align-items: center; gap: var(--s2); }
.t-btn {
  width: 40px; height: 32px; flex: none;
  background: var(--well); border: 1px solid var(--line-soft); border-radius: var(--radius-sm);
  cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
  transition: background var(--dur) var(--ease), transform var(--dur) var(--ease), border-color var(--dur) var(--ease);
}
.t-btn:hover { background: var(--fill-hover); }
.t-btn:active { transform: translateY(1px); }
.t-btn .tri { width: 0; height: 0; border-style: solid; border-width: 5px 0 5px 9px;
  border-color: transparent transparent transparent var(--ink); margin-left: 2px; }
.t-btn .pause { display: flex; gap: 3px; }
.t-btn .pause i { display: block; width: 3px; height: 11px; background: var(--ink); }
.t-count { font-family: var(--font-mono); font-size: var(--text-sm); letter-spacing: var(--track-machine);
  color: var(--ink); font-variant-numeric: tabular-nums; }
.t-count .total { color: var(--scale); }
.t-speed {
  font-family: var(--font-mono); font-size: var(--text-xs); font-weight: var(--w-medium);
  letter-spacing: var(--track-machine); color: var(--scale);
  background: transparent; border: 1px solid var(--line-soft); border-radius: var(--radius-sm);
  padding: var(--half) var(--s1); cursor: pointer; min-width: 44px;
  transition: color var(--dur) var(--ease), border-color var(--dur) var(--ease), transform var(--dur) var(--ease);
  font-variant-numeric: tabular-nums;
}
.t-speed:hover { color: var(--ink); border-color: var(--ink); }
.t-speed:active { transform: translateY(1px); }

/* ============================================================
   窗口舞台
   ============================================================ */
.window {
  width: 1200px; height: 800px; flex: none;
  background: var(--panel); border: 1px solid var(--line-soft); border-radius: var(--radius);
  box-shadow: 0 12px 32px rgba(44,44,42,0.22); /* 仪器落在桌面上，仅窗口层允许投影 */
  display: flex; flex-direction: column; overflow: hidden; position: relative;
}
.titlebar {
  flex: none; display: flex; align-items: center; gap: var(--s1);
  padding: 10px var(--s2); border-bottom: 1px solid var(--line-faint);
}
.titlebar .tl { width: 12px; height: 12px; border-radius: var(--radius-round);
  background: var(--well); border: 1px solid var(--line-soft); }
.titlebar nav { flex: 1; display: flex; justify-content: center; gap: var(--s1); }
.navtab {
  font-family: var(--font-mono); font-size: var(--text-xs); font-weight: var(--w-medium);
  letter-spacing: var(--track-wide); text-transform: uppercase;
  background: transparent; border: none; border-bottom: 1px solid transparent;
  color: var(--scale); padding: var(--half) var(--s1); cursor: pointer;
  transition: color var(--dur) var(--ease), border-color var(--dur) var(--ease);
}
.navtab.active { color: var(--ink); border-bottom-color: var(--ink); }
.titlebar .sys { width: 96px; display: flex; justify-content: flex-end; }

.body { flex: 1; min-height: 0; display: flex; gap: var(--s2); padding: var(--s2); }

/* ============================================================
   磁带架（侧栏）
   ============================================================ */
.rack { width: var(--sidebar-w); flex: none; display: flex; flex-direction: column; gap: var(--s2); min-height: 0; }
.nameplate {
  background: var(--well); border: 1px solid var(--line-soft); border-radius: var(--radius);
  padding: 12px var(--s2);
}
.nameplate .brand { font-family: var(--font-mono); font-size: var(--text-lg); font-weight: var(--w-medium);
  letter-spacing: var(--track-wide); color: var(--ink); }
.nameplate .sub { font-family: var(--font-mono); font-size: var(--text-xs);
  letter-spacing: var(--track-wide); color: var(--scale); margin-top: 2px; text-transform: uppercase; }
.rack-head { display: flex; align-items: baseline; justify-content: space-between; padding: 0 var(--half); }
.rack-list { flex: 1; min-height: 0; overflow-y: auto; display: flex; flex-direction: column; gap: var(--s1); }

/* ============================================================
   主视图：控制面板 + 阅读井
   ============================================================ */
.deck { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: var(--s2); min-height: 0; }
.console {
  background: var(--well); border: 1px solid var(--line-soft); border-radius: var(--radius);
  padding: var(--s2); flex: none;
}
.console .head { display: flex; align-items: baseline; justify-content: space-between; gap: var(--s2); }
.console .meta { display: flex; gap: var(--s2); margin-bottom: var(--half); align-items: baseline; }
.console h1 { font-family: var(--font-sans); font-size: var(--text-xl); font-weight: var(--w-medium);
  line-height: var(--leading-tight); }
.console .dur-pill { font-family: var(--font-mono); font-size: var(--text-sm); letter-spacing: var(--track-machine);
  color: var(--scale); border: 1px solid var(--line-soft); border-radius: var(--radius-round);
  padding: 1px 10px 2px; font-variant-numeric: tabular-nums; }

.reader {
  flex: 1; min-height: 0; overflow-y: auto;
  background: var(--well); border: 1px solid var(--line-soft); border-radius: var(--radius);
  padding: var(--s3) var(--s4);
}
.reader .inner { max-width: 640px; margin: 0 auto; }

/* 笔记五段式排版 */
.tldr {
  background: var(--panel); border: 1px solid var(--line-soft); border-radius: var(--radius);
  padding: var(--s2); margin-bottom: var(--s4);
}
.tldr .lab { margin-bottom: var(--s1); }
.tldr p { font-family: var(--font-sans); font-size: var(--text-lg); font-weight: var(--w-medium);
  line-height: 1.5; text-wrap: balance; }

.nsec { margin-bottom: var(--s4); }
.nsec-head { display: flex; align-items: center; gap: 12px; margin-bottom: var(--s2); }
.nsec-head .rule { flex: 1; height: 1px; background: var(--line-faint); }

.point { margin-bottom: var(--s3); }
.point .phead { display: flex; align-items: center; gap: 12px; margin-bottom: var(--s1); }
.point h3 { font-family: var(--font-sans); font-size: var(--text-lg); font-weight: var(--w-medium); }
.point p { font-family: var(--font-sans); font-size: var(--text-base); line-height: var(--leading-note);
  color: var(--ink); text-wrap: pretty; }
.point .aside { color: var(--scale); }

.quote {
  background: var(--panel); border: 1px solid var(--line-soft); border-radius: var(--radius);
  padding: 12px var(--s2); margin-bottom: 12px;
  display: flex; gap: 12px; align-items: flex-start;
}
.quote .tstamp { flex: none; margin-top: 2px; }
.quote p { font-family: var(--font-sans); font-size: var(--text-base); line-height: 1.6; text-wrap: pretty; }

.res-row { display: flex; gap: 12px; align-items: baseline; padding: var(--s1) 0;
  border-bottom: 1px solid var(--line-faint); }
.res-row:last-child { border-bottom: none; }
.res-row .idx { font-family: var(--font-mono); font-size: var(--text-xs); letter-spacing: var(--track-machine);
  color: var(--scale); flex: none; width: 20px; font-variant-numeric: tabular-nums; }
.res-row .name { font-family: var(--font-sans); font-size: var(--text-base); font-weight: var(--w-medium); flex: none; }
.res-row .ctx { font-family: var(--font-sans); font-size: var(--text-sm); color: var(--scale); line-height: 1.5; }

.dig { display: flex; gap: 12px; align-items: baseline; margin-bottom: 12px; }
.dig .idx { font-family: var(--font-mono); font-size: var(--text-sm); letter-spacing: var(--track-machine);
  color: var(--scale); flex: none; font-variant-numeric: tabular-nums; }
.dig p { font-family: var(--font-sans); font-size: var(--text-base); line-height: 1.6; }

/* 阅读井内的非就绪态 */
.reader-state { display: flex; flex-direction: column; align-items: flex-start; gap: var(--s2); max-width: 480px; }
.reader-state p { font-family: var(--font-sans); font-size: var(--text-base); color: var(--scale);
  line-height: var(--leading-note); }
.reader-state .elapsed { font-family: var(--font-mono); font-size: var(--text-sm);
  letter-spacing: var(--track-machine); color: var(--ink); font-variant-numeric: tabular-nums; }

/* ============================================================
   空状态（首次启动）
   ============================================================ */
.empty-deck {
  flex: 1; min-width: 0; display: flex; flex-direction: column;
  background: var(--well); border: 1px solid var(--line-soft); border-radius: var(--radius);
  align-items: center; justify-content: center; gap: var(--s3); padding: var(--s6);
}
.empty-deck .slot {
  width: 420px; display: flex; flex-direction: column; align-items: center; gap: var(--s3);
}
.empty-deck .hint { font-family: var(--font-sans); font-size: var(--text-base); color: var(--scale);
  text-align: center; line-height: var(--leading-note); }

/* ============================================================
   添加流程（焦点锁定弹层：处理不可分心，模态成立）
   ============================================================ */
.overlay {
  position: absolute; inset: 0; background: rgba(44,44,42,0.35);
  display: flex; align-items: center; justify-content: center; z-index: 10;
}
.addbox {
  width: 440px; background: var(--panel); border: 1px solid var(--line-soft);
  border-radius: var(--radius); padding: var(--s4);
  display: flex; flex-direction: column; align-items: center; gap: var(--s3);
}
.addbox .full { align-self: stretch; }
.stagelist { display: flex; flex-direction: column; gap: 12px; align-self: stretch; }
.stagerow { display: flex; align-items: center; justify-content: space-between; gap: var(--s2); }
.stagerow .detail { font-family: var(--font-mono); font-size: var(--text-xs);
  letter-spacing: var(--track-machine); color: var(--scale); font-variant-numeric: tabular-nums; }
.err-line { font-family: var(--font-sans); font-size: var(--text-base); color: var(--ink);
  line-height: var(--leading-note); align-self: stretch; }
.addbox .btnrow { display: flex; gap: var(--s2); }

/* ============================================================
   设置
   ============================================================ */
.settings { flex: 1; min-width: 0; max-width: 760px; margin: 0 auto; overflow-y: auto;
  display: flex; flex-direction: column; gap: var(--s2); }
.sec {
  background: var(--well); border: 1px solid var(--line-soft); border-radius: var(--radius);
  padding: var(--s2); flex: none;
}
.sec .sec-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: var(--s2); }
.sec .rows { display: flex; flex-direction: column; gap: var(--s2); }
.srow { display: flex; align-items: center; justify-content: space-between; gap: var(--s2); }
.srow .k { font-family: var(--font-sans); font-size: var(--text-base); }
.srow .k small { display: block; font-size: var(--text-sm); color: var(--scale); margin-top: 2px; }
.seg { display: inline-flex; border: 1px solid var(--line-soft); border-radius: var(--radius-sm); overflow: hidden; }
.seg button {
  font-family: var(--font-mono); font-size: var(--text-xs); font-weight: var(--w-medium);
  letter-spacing: var(--track-machine); text-transform: uppercase;
  background: transparent; border: none; color: var(--scale);

let tickTimer = null;

/* ================= 工具 ================= */
const $ = sel => document.querySelector(sel);
const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function fmt(sec) {
  sec = Math.max(0, Math.round(sec));
  const h = Math.floor(sec/3600), m = Math.floor(sec%3600/60), s = sec%60;
  const mm = String(m).padStart(2,'0'), ss = String(s).padStart(2,'0');
  return h > 0 ? `${h}:${mm}:${ss}` : `${mm}:${ss}`;
}
/* 确定性伪随机波形（设计占位，工程侧换 ffmpeg 真实振幅） */
function bars(seed, n = 96) {
  const out = []; let s = seed;
  for (let i = 0; i < n; i++) { s = s * 16807 % 2147483647; out.push(0.25 + (s % 1000)/1000 * 0.75); }
  return out;
}

/* ================= 片段渲染 ================= */
function light(kind, label, extra) {
  return `<span class="light ${kind}"><span class="dot"></span>${label ? `<span class="lab">${label}</span>` : ''}${extra || ''}</span>`;
}
function statusLight(ep) {
  if (ep.status === 'working') return light('working', ep.stage || 'WORKING');
  if (ep.status === 'ready')   return light('done', 'READY');
  if (ep.status === 'error')   return light('error', 'ERROR');
  return light('', 'QUEUED');
}
function tapeHTML(ep) {
  const active = ep.id === S.activeId ? ' active' : '';
  const foot = ep.status === 'working'
    ? `${statusLight(ep)}<span class="dur">${ep.elapsed} ELAPSED</span>`
    : ep.status === 'error'
      ? `${statusLight(ep)}<button class="btn ghost sm" data-act="retry" data-id="${ep.id}">RETRY</button>`
      : `${statusLight(ep)}<span class="dur">${ep.durationLabel}</span>`;
  const err = ep.status === 'error' ? `<div class="err-reason">${esc(ep.errReason)}</div>` : '';
  return `<div class="tape${active}" role="button" tabindex="0" data-act="select" data-id="${ep.id}">
    <span class="row"><span class="show">${esc(ep.show)}</span><span class="date">${ep.date}</span></span>
    <span class="title">${esc(ep.title)}</span>
    ${err}
    <span class="row">${foot}</span>
  </div>`;
}
function rackHTML(eps) {
  return `<aside class="rack">
    <div class="nameplate">
      <div class="brand">PODNOTE</div>
      <div class="sub">Podcast memory unit · 01</div>
    </div>
    <div class="rack-head">
      <span class="slabel dim">TAPES</span>
      <span class="slabel dim">${String(eps.length).padStart(2,'0')}</span>
    </div>
    <div class="rack-list">${eps.map(tapeHTML).join('')}</div>
    <button class="btn secondary" data-act="open-add" style="width:100%">+ 添加剧集</button>
  </aside>`;
}
function waveHTML(ep) {
  /* 锚点只取核心观点：橙色是稀缺资源，引用不上波形 */
  const anchors = ep.note ? ep.note.points.map(x => x.frac) : [];
  const bs = bars(ep.id === 'e1' ? 7 : 23);
  const n = bs.length;
  const inner = bs.map((v, i) => {
    const frac = i / n;
    const isAnchor = anchors.some(a => Math.abs(a - frac) < 0.5 / n);
    const played = frac <= S.playFrac;
    return `<span class="bar${isAnchor ? ' anchor' : played ? ' played' : ''}" style="height:${Math.round(v*70)}%"></span>`;
  }).join('');
  return `<div class="wave" data-act="seek" role="slider" aria-label="播放进度" tabindex="0"
    aria-valuemin="0" aria-valuemax="${ep.durationSec}" aria-valuenow="${Math.round(S.playFrac*ep.durationSec)}">
    ${inner}<span class="head" style="left:calc(${(S.playFrac*100).toFixed(2)}% - 1px)"></span>
  </div>`;
}
function consoleHTML(ep) {
  const cur = fmt(S.playFrac * ep.durationSec);

function secHead(zh, en) {

function noteHTML(ep) {

}
function readerHTML(ep) {
  let body;

  return `<div class="reader">${body}</div>`;

      <span class="slabel dim">ADD TAPE · RUNNING</span>
      <div class="stagelist">
        <div class="stagerow">${light('done', 'RESOLVE')}<span class="detail"><span style="font-family:var(--font-sans);letter-spacing:normal">疯投圈</span> · 1:10:10</span></div>
        <div class="stagerow">${light('done', 'DOWNLOAD')}<span class="detail">64.3 MB</span></div>
        <div class="stagerow">${light('working', 'TRANSCRIBE')}<span class="detail">02:11 ELAPSED</span></div>
        <div class="stagerow">${light('', 'SUMMARIZE')}<span class="detail"></span></div>
        <div class="stagerow">${light('', 'READY')}<span class="detail"></span></div>
      </div>
      <div class="btnrow">
        <button class="btn secondary" data-act="add-close">后台处理</button>
        <button class="btn ghost" data-act="add-close">取消任务</button>
      </div>`;
  } else {
    inner = `
      <span class="slabel signal">ADD TAPE · FAILED</span>
      <div class="stagelist">
        <div class="stagerow">${light('error', 'RESOLVE')}<span class="detail slabel signal">FAILED</span></div>
        <div class="stagerow">${light('', 'DOWNLOAD')}<span class="detail"></span></div>
        <div class="stagerow">${light('', 'TRANSCRIBE')}<span class="detail"></span></div>
        <div class="stagerow">${light('', 'SUMMARIZE')}<span class="detail"></span></div>
        <div class="stagerow">${light('', 'READY')}<span class="detail"></span></div>
      </div>
      <p class="err-line">没解析出音频地址，小宇宙页面结构可能变了。重试不花钱；反复失败的话，把链接发给开发者（就是你）。</p>
      <div class="btnrow">
        <button class="btn secondary" data-act="add-start">RETRY · 重试</button>
        <button class="btn ghost" data-act="add-close">先关掉</button>
      </div>`;
  }
  return `<div class="overlay" data-act="add-close"><div class="addbox" data-stop="1">${inner}</div></div>`;
}
function leverHTML(key, on, disabled) {
  return `<button class="lever" role="switch" aria-checked="${on}" ${disabled ? 'disabled' : ''} data-act="lever" data-key="${key}">
    <span class="track"><span class="thumb"></span></span>
    <span class="state">${on ? 'ON' : 'OFF'}</span>
  </button>`;
}
function segHTML(act, options, cur) {
  return `<span class="seg">${options.map(o =>
    `<button class="${o === cur ? 'on' : ''}" data-act="${act}" data-val="${o}">${o}</button>`).join('')}</span>`;
}
function viewSettings() {
  return `<div class="window">
    ${titlebar('settings')}
    <div class="body">
      <main class="settings">
        <div class="sec">
          <div class="sec-head"><span class="slabel dim">ENGINE</span></div>
          <div class="rows">
            <div class="srow">
              <span class="k">Anthropic API Key<small>只存在本机 Keychain，不上传</small></span>
              <input class="input" type="password" value="sk-ant-api03-9f2kX" style="width:280px" aria-label="API Key">
            </div>
            <div class="srow">
              <span class="k">笔记模型</span>
              ${segHTML('set-llm', ['SONNET', 'OPUS'], S.llm)}
            </div>
            <div class="srow">
              <span class="k">whisper 模型<small>LARGE-V3 更准，MEDIUM 快约一倍</small></span>
              ${segHTML('set-whisper', ['MEDIUM', 'LARGE-V3'], S.whisper)}
            </div>
          </div>
        </div>
        <div class="sec">
          <div class="sec-head"><span class="slabel dim">OUTPUT</span></div>
          <div class="rows">
            <div class="srow">
              <span class="k">笔记输出目录<small>可直接指向你的笔记库</small></span>
              <input class="input" value="~/Documents/Podnote" style="width:280px" aria-label="笔记输出目录">
            </div>
            <div class="srow">
              <span class="k">转写完成后自动生成笔记</span>
              ${leverHTML('autoSum', S.levers.autoSum)}
            </div>
            <div class="srow">
              <span class="k">开机启动</span>
              ${leverHTML('launch', S.levers.launch)}
            </div>
          </div>
        </div>
        <div class="sec">
          <div class="sec-head">
            <span class="slabel dim">SUBSCRIPTIONS</span>
            <span class="slabel dim">V2 · PLANNED</span>
          </div>
          <div class="rows">
            ${DATA.subscriptions.map(s => `
              <div class="srow">
                <span class="k" style="color:var(--scale)">${esc(s)}<small>新集自动转写</small></span>
                ${leverHTML('sub:' + s, S.subs[s], true)}
              </div>`).join('')}
          </div>
        </div>
      </main>
    </div>
  </div>`;
}
function viewTray() {
  const ready = DATA.episodes.filter(e => e.status === 'ready');
  const working = DATA.episodes.find(e => e.status === 'working');
  const items = [DATA.episodes[1], DATA.episodes[0], DATA.episodes[2]];
  return `<div class="tray-stage">
    <div class="tray-bar">
      <span class="slabel dim">…</span>
      ${light(working ? 'working' : 'done', '')}
      <span class="slabel">14:32</span>
    </div>
    <div class="tray-pop">
      <div class="pop-head">
        <span class="slabel dim">PODNOTE</span>
        <span class="slabel">${String(ready.length).padStart(2,'0')} READY</span>
      </div>
      ${items.map(ep => `
        <button class="tray-item">
          <span class="row">
            <span class="src">${esc(ep.show)} · ${ep.date}</span>
            ${statusLight(ep)}
          </span>
          <span class="t">${esc(ep.title)}</span>
          ${ep.status === 'working' ? `<span class="peek">TRANSCRIBING · ${ep.elapsed} elapsed</span>`
            : ep.note ? `<span class="peek">${esc(ep.note.tldr)}</span>` : ''}
        </button>`).join('')}
      <button class="tray-foot">打开 Podnote ↗</button>
    </div>
  </div>`;
}

/* ================= 渲染与事件 ================= */
function render() {
  const stage = $('#stage');
  if (S.view === 'empty') stage.innerHTML = viewEmpty();
  else if (S.view === 'settings') stage.innerHTML = viewSettings();
  else if (S.view === 'tray') stage.innerHTML = viewTray();
  else if (S.view === 'working') { S.activeId = 'e2'; stage.innerHTML = viewMain(DATA.episodes); }
  else stage.innerHTML = viewMain(DATA.episodes);
  document.querySelectorAll('.proof button').forEach(b =>
    b.classList.toggle('on', b.dataset.v === (S.view === 'add' ? 'add' : S.view)));
}
document.querySelector('.proof').addEventListener('click', e => {
  const b = e.target.closest('button[data-v]'); if (!b) return;
  const v = b.dataset.v;
  stopTick();
  if (v === 'add') { S.view = 'add'; S.addAct = S.addAct || 0; }
  else S.view = v;
  if (v === 'main') S.activeId = 'e1';
  render();
});
document.body.addEventListener('click', e => {
  const el = e.target.closest('[data-act]'); if (!el) return;
  const act = el.dataset.act;
  if (act === 'select') { S.activeId = el.dataset.id; const ep = DATA.episodes.find(x => x.id === S.activeId);
    S.playFrac = ep.progress ?? 0; S.playing = false; stopTick(); render(); }
  else if (act === 'nav') { stopTick(); S.view = el.dataset.to === 'settings' ? 'settings' : 'main'; render(); }
  else if (act === 'jump') { S.playFrac = parseFloat(el.dataset.frac); render(); }
  else if (act === 'seek') { const r = el.getBoundingClientRect();
    S.playFrac = Math.min(1, Math.max(0, (e.clientX - r.left) / r.width)); render(); }
  else if (act === 'toggle-play') { S.playing = !S.playing; S.playing ? startTick() : stopTick(); render(); }
  else if (act === 'speed') { S.speed = S.speed === 1 ? 1.5 : S.speed === 1.5 ? 2 : 1; render(); }
  else if (act === 'open-add') { S.view = 'add'; S.addAct = 0; render(); }
  else if (act === 'add-start') { S.addAct = 1; render(); }
  else if (act === 'add-close') { if (e.target.closest('[data-stop]') && act !== 'add-close') return;
    S.view = 'main'; render(); }
  else if (act === 'lever') { const k = el.dataset.key;
    if (k in S.levers) S.levers[k] = !S.levers[k]; render(); }
  else if (act === 'set-llm') { S.llm = el.dataset.val; render(); }
  else if (act === 'set-whisper') { S.whisper = el.dataset.val; render(); }
  else if (act === 'retry') { /* 设计稿：无真实管线 */ }
});
/* 弹层内部点击不关闭 */
document.body.addEventListener('click', e => {
  const box = e.target.closest('[data-stop]');
  if (box && e.target.closest('.overlay') && !e.target.closest('[data-act]')) e.stopPropagation();
}, true);

/* 播放模拟：500ms 机械跳步，不做平滑动画 */
function startTick() {
  stopTick();
  tickTimer = setInterval(() => {
    const ep = DATA.episodes.find(x => x.id === S.activeId);
    if (!ep || !S.playing) return;
    S.playFrac = Math.min(1, S.playFrac + (0.5 * S.speed) / ep.durationSec);
    if (S.playFrac >= 1) { S.playing = false; stopTick(); }
    render();
  }, 500);
}
function stopTick() { if (tickTimer) { clearInterval(tickTimer); tickTimer = null; } }

render();
</script>
</body>
</html>
